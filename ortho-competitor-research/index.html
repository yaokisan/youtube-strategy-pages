<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">

  <title>オルソグループ YouTube競合チャンネル調査</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #15201c;
      --muted: #607069;
      --line: #dfe6e2;
      --bg: #f7faf8;
      --panel: #ffffff;
      --accent: #0f7b63;
      --accent-soft: #e5f4ef;
      --gold: #b7791f;
      --gold-soft: #fff5db;
      --blue: #2563eb;
      --blue-soft: #e8f0ff;
      --shadow: 0 12px 34px rgba(24, 45, 38, 0.08);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "YuGothic", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.6;
    }
    a { color: inherit; }
    .hero {
      background:
        radial-gradient(circle at 20% 10%, rgba(37, 99, 235, 0.24), transparent 28%),
        linear-gradient(135deg, #10231e 0%, #173b32 54%, #0f2b34 100%);
      color: #fff;
      padding: 52px 40px 46px;
    }
    .hero-inner, main {
      max-width: 1180px;
      margin: 0 auto;
    }
    .eyebrow {
      color: #93d8c5;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0;
      margin: 0 0 12px;
    }
    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 48px);
      line-height: 1.15;
      letter-spacing: 0;
      max-width: 960px;
    }
    main {
      padding: 26px 24px 64px;
    }
    .toolbar {
      position: sticky;
      top: 0;
      z-index: 2;
      display: grid;
      grid-template-columns: minmax(260px, 1fr) 220px 220px;
      gap: 12px;
      align-items: center;
      background: rgba(247, 250, 248, 0.94);
      backdrop-filter: blur(14px);
      padding: 14px 0;
      margin-bottom: 18px;
    }
    .control {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      font-size: 15px;
      padding: 12px 14px;
    }
    .section {
      margin-top: 26px;
    }
    .section-head {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: end;
      margin: 0 0 12px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 9px;
    }
    .section h2 {
      margin: 0;
      font-size: 22px;
      letter-spacing: 0;
    }
    .channel-list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }
    .channel-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .channel-top {
      display: grid;
      grid-template-columns: 60px 1fr auto;
      gap: 14px;
      padding: 16px;
      align-items: center;
      border-bottom: 1px solid var(--line);
    }
    .avatar {
      width: 60px;
      height: 60px;
      border-radius: 8px;
      object-fit: cover;
      background: #eef3f0;
    }
    .channel-title {
      font-size: 18px;
      line-height: 1.35;
      margin: 0;
    }
    .channel-title a {
      text-decoration: none;
    }
    .channel-title a:hover { text-decoration: underline; }
    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 12px;
      font-weight: 800;
      background: #edf2f0;
      color: #40534b;
      white-space: nowrap;
    }
    .badge.weight-core {
      background: var(--accent-soft);
      color: var(--accent);
    }
    .badge.weight-adjacent {
      background: var(--gold-soft);
      color: var(--gold);
    }
    .badge.weight-broad {
      background: var(--blue-soft);
      color: var(--blue);
    }
    .badge.subcategory {
      background: #f2f6f4;
      color: #51645d;
      font-weight: 700;
    }
    .metrics {
      display: grid;
      grid-template-columns: repeat(2, minmax(110px, 1fr));
      gap: 8px;
      min-width: 270px;
    }
    .metric {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      background: #fbfdfc;
    }
    .metric .k {
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
    }
    .metric .v {
      font-size: 18px;
      font-weight: 850;
      margin-top: 2px;
    }
    .videos {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
      padding: 0 16px 16px;
    }
    .video {
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
      min-width: 0;
    }
    .video a {
      text-decoration: none;
      display: block;
      height: 100%;
    }
    .thumb-wrap {
      position: relative;
      aspect-ratio: 16 / 9;
      background: #e8eeeb;
      overflow: hidden;
    }
    .thumb {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .video-body {
      padding: 9px;
    }
    .video-title {
      font-size: 12px;
      font-weight: 700;
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      min-height: 52px;
    }
    .video-meta {
      color: var(--muted);
      font-size: 11px;
      margin-top: 7px;
      display: flex;
      justify-content: space-between;
      gap: 6px;
    }
    .empty {
      display: none;
      background: var(--panel);
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 36px;
      text-align: center;
      color: var(--muted);
      margin-top: 20px;
    }
    footer {
      color: var(--muted);
      font-size: 12px;
      border-top: 1px solid var(--line);
      padding-top: 18px;
      margin-top: 36px;
    }

    @media (max-width: 980px) {
      .toolbar { grid-template-columns: 1fr; }
      .channel-top { grid-template-columns: 52px 1fr; }
      .avatar { width: 52px; height: 52px; }
      .metrics {
        grid-column: 1 / -1;
        min-width: 0;
      }
      .videos { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 620px) {
      .hero { padding: 34px 22px 36px; }
      main { padding: 20px 14px 48px; }
      .section-head { display: block; }
      .metrics { grid-template-columns: 1fr; }
      .videos { grid-template-columns: 1fr; }
    }
  </style>
</head>

    const categoryOrder = ["direct_sports_medicine","entry_consumer_pain","professional_learning","prevention_health_literacy","product_adjacent","thought_documentary"];
    const categoryLabels = {"direct_sports_medicine":"スポーツ整形/スポーツ障害","entry_consumer_pain":"生活者の痛み・セルフケア","professional_learning":"専門職向け学習","prevention_health_literacy":"予防/健康リテラシー","thought_documentary":"思想/医療経営/現場","product_adjacent":"商品隣接"};
    const content = document.getElementById('content');
    const search = document.getElementById('search');
    const empty = document.getElementById('empty');
    const categoryFilter = document.getElementById('categoryFilter');
    const sortSelect = document.getElementById('sortSelect');

    function formatNumber(value) {
      if (value === null || value === undefined) return '-';
      return Number(value).toLocaleString('ja-JP');
    }

    function shortNumber(value) {
      if (value === null || value === undefined) return '-';
      const n = Number(value);
      if (n >= 100000000) return String((n / 100000000).toFixed(1)).replace(/\.0$/, '') + '億';
      if (n >= 10000) return String((n / 10000).toFixed(1)).replace(/\.0$/, '') + '万';
      return n.toLocaleString('ja-JP');
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function weightClass(weight) {
      if (weight === '重点') return 'weight-core';
      if (weight === '隣接') return 'weight-adjacent';
      if (weight === '広義参考') return 'weight-broad';
      return '';
    }

    function channelMatches(channel, term) {
      if (!term) return true;
      const haystack = [
        channel.title,
        channel.primaryCategoryLabel,
        channel.weight,
        ...(channel.professionalSubcategories || []),
        ...(channel.hitQueries || []),
        ...(channel.recent5 || []).map((video) => video.title)
      ].join(' ').toLowerCase();
      return haystack.includes(term.toLowerCase());
    }

    function sortChannels(items, mode) {
      const sorted = [...items];
      if (mode === 'avg5') {
        return sorted.sort((a, b) => (b.avg5ViewCount || 0) - (a.avg5ViewCount || 0));
      }
      if (mode === 'category') {
        return sorted.sort((a, b) => {
          const categoryDelta = categoryOrder.indexOf(a.primaryCategory) - categoryOrder.indexOf(b.primaryCategory);
          if (categoryDelta !== 0) return categoryDelta;
          return (b.subscriberCount || 0) - (a.subscriberCount || 0);
        });
      }
      return sorted.sort((a, b) => (b.subscriberCount || 0) - (a.subscriberCount || 0));
    }

    function renderVideo(video) {
      return `
        <article class="video">
          <a href="${escapeHtml(video.url)}" target="_blank" rel="noreferrer">
            <div class="thumb-wrap"><img class="thumb" src="${escapeHtml(video.thumbnailUrl)}" alt=""></div>
            <div class="video-body">
              <div class="video-title">${escapeHtml(video.title)}</div>
              <div class="video-meta">
                <span>${escapeHtml(video.publishedDate || '-')}</span>
                <span>${shortNumber(video.viewCount)}回</span>
              </div>
            </div>
          </a>
        </article>
      `;
    }

    function renderChannel(channel) {
      return `
        <article class="channel-card" data-weight="${escapeHtml(channel.weight)}" data-category="${escapeHtml(channel.primaryCategory)}">
          <div class="channel-top">
            <img class="avatar" src="${escapeHtml(channel.thumbnailUrl)}" alt="">
            <div>
              <h3 class="channel-title"><a href="${escapeHtml(channel.url)}" target="_blank" rel="noreferrer">${escapeHtml(channel.title)}</a></h3>
              <div class="badges">
                <span class="badge ${weightClass(channel.weight)}">${escapeHtml(channel.weight)}</span>
                <span class="badge">${escapeHtml(channel.primaryCategoryLabel)}</span>
                ${(channel.professionalSubcategories || []).map((label) => '<span class="badge subcategory">' + escapeHtml(label) + '</span>').join('')}
              </div>
            </div>
            <div class="metrics" aria-label="チャンネル指標">
              <div class="metric"><div class="k">登録者数</div><div class="v">${shortNumber(channel.subscriberCount)}</div></div>
              <div class="metric"><div class="k">直近5本平均</div><div class="v">${shortNumber(channel.avg5ViewCount)}</div></div>
            </div>
          </div>
          <div class="videos">
            ${(channel.recent5 || []).map(renderVideo).join('')}
          </div>
        </article>
      `;
    }

    function render() {
      const term = search.value.trim();
      const selectedCategory = categoryFilter.value;
      const sortMode = sortSelect.value;
      const filtered = channels.filter((channel) => {
        const categoryOk = selectedCategory === 'all' || channel.primaryCategory === selectedCategory;
        return categoryOk && channelMatches(channel, term);
      });

      if (sortMode === 'category') {
        const grouped = new Map();
        for (const category of categoryOrder) grouped.set(category, []);
        for (const channel of sortChannels(filtered, 'category')) {
          if (!grouped.has(channel.primaryCategory)) grouped.set(channel.primaryCategory, []);
          grouped.get(channel.primaryCategory).push(channel);
        }

        const sections = [];
        for (const [category, items] of grouped.entries()) {
          if (!items.length) continue;
          sections.push(`
            <section class="section">
              <div class="section-head">
                <h2>${escapeHtml(categoryLabels[category] || category)}</h2>
              </div>
              <div class="channel-list">
                ${items.map(renderChannel).join('')}
              </div>
            </section>
          `);
        }
        content.innerHTML = sections.join('');
      } else {
        const sorted = sortChannels(filtered, sortMode);
        content.innerHTML = `
          <section class="section">
            <div class="channel-list">
              ${sorted.map(renderChannel).join('')}
            </div>
          </section>
        `;
      }

      empty.style.display = filtered.length ? 'none' : 'block';
    }

    search.addEventListener('input', render);
    categoryFilter.addEventListener('change', render);
    sortSelect.addEventListener('change', render);
    render();
  </script>
